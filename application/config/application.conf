# privchat-application v1.2 scaffold
# JWT + PostgreSQL + 三文件日志

[application]
name = "privchat-application"
debug = false

[server]
port = 8080
host = "0.0.0.0"

[security.jwt]
# Override via env: NETON_SECURITY__JWT__SECRETKEY=<your-secret>
secretKey = "REPLACE_ME_SET_NETON_SECURITY__JWT__SECRETKEY"
headerName = "Authorization"
tokenPrefix = "Bearer "

# Unified token (spec TOKEN_UNIFICATION_SPEC v1.3 Phase A).
#
# 默认 dormant：enabled=false + verify_legacy_jwt=true → 现网 HS256 行为完全不变。
#
# 切换组合（DispatchingJwtAuthenticator 路由规则）：
#   enabled=false, verify_legacy_jwt=true   ← 默认。仅 legacy 接受
#   enabled=true,  verify_legacy_jwt=true   ← phase B 起。双验
#   enabled=true,  verify_legacy_jwt=false  ← phase C。仅 unified 接受
#   enabled=false, verify_legacy_jwt=false  ← FAIL-FAST，启动直接抛
[security.unified_token]
enabled = false
verify_legacy_jwt = true
jwks_url = "http://localhost:9090/api/service/auth/jwks"
introspect_url = "http://localhost:9090/api/service/auth/introspect"
introspect_enabled = true
session_cache_ttl_secs = 30
jwks_cache_ttl_secs = 3600

[database]
driver = "POSTGRESQL"
# Override via env: NETON_DATABASE__URI=postgresql://user:pass@host:5432/dbname
uri = "postgresql://zoujiaqing:privchat@localhost:5432/privchat-application"
debug = false

[logging]
level = "INFO"

[logging.async]
enabled = true
queueSize = 8192
flushEveryMs = 200
flushBatchSize = 64
shutdownFlushTimeoutMs = 2000

[[logging.sinks]]
name = "access"
file = "logs/access.log"
levels = "INFO"
route = "http.access"

[[logging.sinks]]
name = "error"
file = "logs/error.log"
levels = "ERROR,WARN"

[[logging.sinks]]
name = "all"
file = "logs/all.log"
levels = "ALL"
