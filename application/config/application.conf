# neton-application v1 scaffold
# JWT + MySQL + 三文件日志

[application]
name = "neton-application"
debug = false

[server]
port = 8080
host = "0.0.0.0"

[security.jwt]
secretKey = "dev-only-change-me"
headerName = "Authorization"
tokenPrefix = "Bearer "

[database]
driver = "MYSQL"
uri = "mysql://root:123456@localhost:3306/neton-application"
debug = false

[logging]
level = "INFO"

[logging.async]
enabled = true
queueSize = 8192
flushEveryMs = 200
flushBatchSize = 64
shutdownFlushTimeoutMs = 2000

[[logging.sinks]]
name = "access"
file = "logs/access.log"
levels = "INFO"
route = "http.access"

[[logging.sinks]]
name = "error"
file = "logs/error.log"
levels = "ERROR,WARN"

[[logging.sinks]]
name = "all"
file = "logs/all.log"
levels = "ALL"
