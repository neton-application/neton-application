# neton-application v1 scaffold
# JWT + MySQL + 三文件日志

[application]
name = "neton-application"
debug = false

[server]
port = 8080
host = "0.0.0.0"

[security.jwt]
# Override via env: NETON_SECURITY__JWT__SECRETKEY=<your-secret>
secretKey = "REPLACE_ME_SET_NETON_SECURITY__JWT__SECRETKEY"
headerName = "Authorization"
tokenPrefix = "Bearer "

[database]
driver = "MYSQL"
# Override via env: NETON_DATABASE__URI=mysql://user:pass@host:3306/dbname
uri = "mysql://REPLACE_ME@localhost:3306/neton-application"
debug = false

[logging]
level = "INFO"

[logging.async]
enabled = true
queueSize = 8192
flushEveryMs = 200
flushBatchSize = 64
shutdownFlushTimeoutMs = 2000

[[logging.sinks]]
name = "access"
file = "logs/access.log"
levels = "INFO"
route = "http.access"

[[logging.sinks]]
name = "error"
file = "logs/error.log"
levels = "ERROR,WARN"

[[logging.sinks]]
name = "all"
file = "logs/all.log"
levels = "ALL"
