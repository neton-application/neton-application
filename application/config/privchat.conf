# PrivChat IM 接入配置
# spec: privchat-docs/spec/07-application/MODULE_PRIVCHAT_SPEC.md §5
#
# 生产环境通过环境变量覆盖：
#   NETON_PRIVCHAT__SERVER__SERVICE_API_BASE_URL=https://privchat-server.internal
#   NETON_PRIVCHAT__SERVER__SERVICE_MASTER_KEY=<secret>
#   NETON_PRIVCHAT__SERVER__BUSINESS_SYSTEM_ID=privchat-application

[server]
service_api_base_url = "http://localhost:9090"
service_master_key = "REPLACE_ME_SET_NETON_PRIVCHAT__SERVER__SERVICE_MASTER_KEY"
business_system_id = "privchat-application"
